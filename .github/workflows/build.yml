# GitHub Actions 工作流
# 作用：自动构建 Docker 镜像并推送到 GitHub Packages

name: Build and Push Docker Image

# 环境变量
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# 触发条件：什么时候执行这个工作流
on:
  # 1. 推送到 main 分支时触发
  push:
    branches: [ main ]
    # 2. 打标签时触发（如 v1.0.0）
    tags: [ 'v*' ]
  # 3. 手动触发（在 GitHub 网页上点击按钮）
  workflow_dispatch:

# 任务定义
jobs:
  # 任务名：build
  build:
    # 运行环境：Ubuntu 最新版
    runs-on: ubuntu-latest
    
    # 权限设置（用于推送镜像到 ghcr.io）
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    
    # 执行步骤
    steps:
    # 步骤 1：检出代码
    - name: Checkout code
      uses: actions/checkout@v5
    
    # 步骤 2：设置 Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    
    # 步骤 3：登录 GitHub Container Registry
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    # 步骤 4：提取元数据（标签、标签等）
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=tag
          type=sha,prefix={{branch}}-
          latest
    
    # 步骤 5：构建 Docker 镜像（本地，用于导出 tar）
    - name: Build Docker image locally
      run: |
        docker build -t teable-uploader:latest .
        docker save -o teable-uploader.tar teable-uploader:latest
        ls -lh teable-uploader.tar
    
    # 步骤 6：推送镜像到 GitHub Packages
    - name: Push Docker image to GHCR
      id: push
      run: |
        docker tag teable-uploader:latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        # 推送其他标签
        docker tag teable-uploader:latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
        docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
    
    # 步骤 7：上传 tar 作为 artifact（可在 Actions 页面下载）
    - name: Upload tar artifact
      uses: actions/upload-artifact@v5
      with:
        name: teable-uploader-image
        path: teable-uploader.tar
        retention-days: 30
    
    # 步骤 8：生成构件证明（可选，用于安全审计）
    - name: Generate artifact attestation
      uses: actions/attest-build-provenance@v2
      with:
        subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        subject-digest: ${{ steps.push.outputs.digest }}
        push-to-registry: true
