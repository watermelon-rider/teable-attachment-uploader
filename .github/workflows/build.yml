# GitHub Actions 工作流
# 作用：自动构建 Docker 镜像并导出 tar 文件

name: Build Docker Image

# 触发条件：什么时候执行这个工作流
on:
  # 1. 推送到 main 分支时触发
  push:
    branches: [ main ]
  # 2. 打标签时触发（如 v1.0.0）
  tag:
    tags: [ 'v*' ]
  # 3. 手动触发（在 GitHub 网页上点击按钮）
  workflow_dispatch:

# 任务定义
jobs:
  # 任务名：build
  build:
    # 运行环境：Ubuntu 最新版
    runs-on: ubuntu-latest
    
    # 执行步骤
    steps:
    # 步骤 1：检出代码
    # 使用 GitHub 官方提供的 action
    - name: Checkout code
      uses: actions/checkout@v4
    
    # 步骤 2：设置 Docker Buildx（用于构建镜像）
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    # 步骤 3：构建 Docker 镜像
    - name: Build Docker image
      run: |
        docker build -t teable-uploader:latest .
    
    # 步骤 4：导出镜像为 tar 文件
    - name: Export Docker image
      run: |
        docker save -o teable-uploader.tar teable-uploader:latest
        ls -lh teable-uploader.tar
    
    # 步骤 5：上传构建产物（作为 artifact，可在 Actions 页面下载）
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: teable-uploader-image
        path: teable-uploader.tar
        retention-days: 30  # 保留 30 天
    
    # 步骤 6（可选）：如果是打 tag，发布到 Release
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: teable-uploader.tar
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
